default:
  image: oven/bun:1-alpine

stages:
  - verify
  - test
  - build
  - deploy

check:
  stage: verify
  script:
    - bun install --frozen-lockfile
    - bunx biome check .
    - bunx tsc --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend_unit_tests:
  image: node:20-bookworm
  stage: test
  script:
    - npm ci --ignore-scripts
    - npx jest --runInBand --ci
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

backend_endpoint_tests:
  stage: test
  script:
    - apk add --no-cache python3 py3-pip
    - python3 -m venv .venv
    - . .venv/bin/activate
    - pip install -r requirements.txt
    - pip install -r tests/requirements.txt
    - python3 -m pytest backend/tests -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

postman_api_tests:
  stage: test
  script:
    - bun install --frozen-lockfile
    - bun tests/mock-api-server.ts > /tmp/railreach-server.log 2>&1 &
    - for i in $(seq 1 30); do wget -q -O - http://127.0.0.1:3000/api/stations > /dev/null && break; sleep 1; done
    - bun run test:postman
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

selenium_acceptance_tests:
  image: python:3.11-bookworm
  stage: test
  script:
    - apt-get update
    - apt-get install -y chromium chromium-driver curl
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun"
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - python -m pip install -r tests/requirements.txt
    - python -m pytest tests/selenium -q
  allow_failure: true
  rules:
    - if: '$RUN_SELENIUM == "true"'

build_dist:
  stage: build
  script:
    - bun install --frozen-lockfile
    - bun run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

docker_push:
  image: docker:24.0.5
  stage: deploy
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  needs:
    - build_dist
  script:
    - apk add --no-cache aws-cli
    # ECR login (expects AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION to be set in GitLab CI/CD variables)
    - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
    # Build image from Dockerfile that copies ./dist
    - docker build --provenance=false -t "rail-reach:latest" .
    - docker tag rail-reach:latest ${ECR_REGISTRY}:latest
    - docker push ${ECR_REGISTRY}:latest
    # Update the Lambda function with the new image
    - aws lambda update-function-code --function-name "$LAMBDA_FUNCTION_NAME" --image-uri "${ECR_REGISTRY}:latest"
  rules:
    # Only push images for main branch
    - if: '$CI_COMMIT_BRANCH == "main"'
