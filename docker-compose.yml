services:
  postgres:
    image: postgres:16-alpine
    container_name: railreach-postgres
    environment:
      POSTGRES_USER: railreach
      POSTGRES_PASSWORD: railreach
      POSTGRES_DB: railreach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railreach -d railreach"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
